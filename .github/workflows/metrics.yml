name: Metrics

on:
  # run every 12 hours
  schedule:
    - cron: "30 */12 * * *"
  # run on manual trigger from the Actions tab
  workflow_dispatch:
  # run on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate isocalendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: visrutsuresh
          filename: github-metrics.svg
          base: ""
          config_timezone: Asia/Singapore
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
